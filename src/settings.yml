---
strategy: polling
no_screen_padding: 'no'
dark_mode: 'no'
static_data: ''
polling_verb: post
framework_version: latest
serverless_language: node
polling_url: "{{ matomo_base_url }}/?module=API&method=API.getBulkRequest&format=JSON&urls[0]=method%3DVisitsSummary.get%26idSite%3D{{ matomo_site_id }}%26period%3Dday%26date%3D{{ matomo_date_range }}&urls[1]=method%3DSitesManager.getSiteFromId%26idSite%3D{{ matomo_site_id }}&urls[2]=method%3DActions.getPageUrls%26flat%3D1%26filter_sort_column%3Dnb_hits%26filter_sort_order%3Ddesc%26idSite%3D{{ matomo_site_id }}%26period%3Drange%26date%3D{{ matomo_date_range }}%26filter_limit%3D20&urls[3]=method%3DReferrers.getAll%26idSite%3D{{ matomo_site_id }}%26period%3Drange%26date%3D{{ matomo_date_range }}%26filter_limit%3D20&urls[4]=method%3DUserCountry.getCountry%26idSite%3D{{ matomo_site_id }}%26period%3Drange%26date%3D{{ matomo_date_range }}%26filter_limit%3D20\n"
polling_headers: Content-Type=application/x-www-form-urlencoded
polling_body: token_auth={{ matomo_api_key }}
id: 97234
custom_fields:
- keyname: author_bio
  name: About This Plugin
  field_type: author_bio
  category: analytics
  description: Displays web analytics from Matomo for a selected Site.
  github_url: https://github.com/stephenyeargin/trmnl-matomo
  learn_more_url: https://matomo.org/
  email_address: stephen@yearg.in
- keyname: matomo_api_key
  field_type: password
  name: Matomo API Key
  description: User's API Key for Matomo
  placeholder: user_somelongstringoeshere
- keyname: matomo_base_url
  field_type: url
  name: Matomo Base URL
  description: The URL of your Matomo installation
  placeholder: https://analytics.example.com/matomo
- keyname: matomo_site_id
  field_type: number
  placeholder: '1'
  name: Site ID
  description: The integer ID of the desired site for reporting. <a href="https://matomo.org/faq/general/faq_19212/"  class="underline" target="_blank">Learn More</a>
- keyname: matomo_date_range
  field_type: select
  name: Date Range
  description: Time period for analytics data
  default: last30
  options:
  - Today: today
  - Yesterday: yesterday
  - Last 7 days (including today): last7
  - Last 7 days (excluding today): previous7
  - Last 14 days (including today): last14
  - Last 14 days (excluding today): previous14
  - Last 30 days (including today): last30
  - Last 30 days (excluding today): previous30
  - Last 90 days (including today): last90
  - Last 90 days (excluding today): previous90
  - Previous week: lastWeek
  - Previous month: lastMonth
  - Previous year: lastYear
- keyname: matomo_active_view
  field_type: select
  name: View
  description: Select what data you want to display
  default: metrics
  options:
  - Metrics: metrics
  - Top Landing Pages: landing_pages
  - Top Referrers: top_referrers
  - Top Countries: top_countries
- keyname: matomo_locale
  field_type: select
  name: Locale
  description: Sets how dates and numbers should be formatted
  default: en-US
  options:
  - United States English (en-US): en-US
  - Arabic (Saudi Arabia) (ar-SA): ar-SA
  - British English (en-GB): en-GB
  - Chinese Simplified (China) (zh-CN): zh-CN
  - French (France) (fr-FR): fr-FR
  - German (Germany) (de-DE): de-DE
  - Hindi (India) (hi-IN): hi-IN
  - Japanese (Japan) (ja-JP): ja-JP
  - Portuguese (Brazil) (pt-BR): pt-BR
  - Russian (Russia) (ru-RU): ru-RU
  - Spanish (Spain) (es-ES): es-ES
name: Matomo Analytics
refresh_interval: 1440
